services:
  postgres:
    image: postgres:16-alpine
    container_name: fdo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fdo
      POSTGRES_PASSWORD: fdo
      POSTGRES_DB: fantasy_draft_order
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fdo -d fantasy_draft_order"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
